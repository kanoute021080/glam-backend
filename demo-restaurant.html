<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Teranga Restaurant — AI Order Assistant</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#1a0a00;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;overflow-x:hidden}
.wrap{width:100%;max-width:420px}
.demo-badge{text-align:center;margin-bottom:10px}
.demo-badge span{font-size:11px;background:#c17f24;color:#fff;padding:4px 12px;border-radius:20px;letter-spacing:1px}
.lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:10px}
.lang-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #c17f24;background:transparent;color:#c17f24;cursor:pointer;font-weight:500}
.lang-btn.active{background:#c17f24;color:#fff}
.chat-hdr{background:#2d1500;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0;border:1px solid #c17f24;border-bottom:none}
.av{width:38px;height:38px;border-radius:50%;background:#c17f24;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.hdr-name{font-size:14px;font-weight:600;color:#f5e6c8}
.hdr-status{font-size:11px;color:#c17f24;display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c98a;display:inline-block}
.chat-body{height:380px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#0d0500;border:1px solid #3d1f00;border-top:none}
.bw-bot{display:flex;flex-direction:column;align-items:flex-start}
.bw-user{display:flex;flex-direction:column;align-items:flex-end}
.bl{font-size:10px;color:#8a6a3a;margin-bottom:2px}
.bb{font-size:14px;line-height:1.6;padding:10px 14px;max-width:85%}
.bb-bot{background:#2d1500;color:#f5e6c8;border:1px solid #3d1f00;border-radius:4px 14px 14px 14px}
.bb-user{background:#c17f24;color:#fff;border-radius:14px 4px 14px 14px}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#0d0500;border:1px solid #3d1f00;border-top:none}
.qbtn{font-size:12px;padding:6px 12px;border:1px solid #c17f24;border-radius:20px;background:transparent;color:#c17f24;cursor:pointer}
.qbtn:active{background:#c17f24;color:#fff}
.input-row{display:flex;gap:8px;padding:10px 12px;background:#2d1500;border:1px solid #c17f24;border-top:none;border-radius:0 0 12px 12px;align-items:center}
.inp{flex:1;font-size:14px;padding:9px 14px;border-radius:20px;border:1px solid #3d1f00;background:#0d0500;color:#f5e6c8;outline:none}
.inp::placeholder{color:#8a6a3a}
.send-btn{width:38px;height:38px;border-radius:50%;background:#c17f24;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.order-card{background:#2d1500;border:1px solid #c17f24;border-radius:12px;padding:14px;max-width:88%}
.footer{text-align:center;font-size:11px;color:#8a6a3a;margin-top:10px}
.footer a{color:#c17f24;text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo-badge"><span>🍽️ LIVE DEMO — Powered by Dianke.ai</span></div>

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en',this)">🇺🇸 English</button>
    <button class="lang-btn" onclick="setLang('fr',this)">🇫🇷 Français</button>
    <button class="lang-btn" onclick="setLang('wo',this)">🇸🇳 Wolof</button>
  </div>

  <div class="chat-hdr">
    <div class="av">TR</div>
    <div>
      <div class="hdr-name">Teranga Restaurant</div>
      <div class="hdr-status"><span class="dot"></span><span id="status-text">AI assistant · always open</span></div>
    </div>
  </div>

  <div class="chat-body" id="chat-body"></div>

  <div class="quick-btns" id="quick-btns"></div>

  <div class="input-row">
    <input class="inp" id="inp" onkeydown="if(event.key==='Enter')send()"/>
    <button class="send-btn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer">Want this for your restaurant? <a href="https://dianke.ai">dianke.ai</a></div>
</div>

<script>
const BACKEND="https://dianke.ai";
let hist=[], busy=false, currentLang="en";

const LANGS={
  en:{
    status:"AI assistant · always open",
    placeholder:"Type your order or question...",
    label:"Teranga AI",
    welcome:"Welcome to Teranga Restaurant! 🍽️ I can help you place an order for dine-in, takeout, or delivery. What would you like today?",
    quick:["📋 See the menu","🥘 Order Thieboudienne","🍖 Order Yassa Poulet","⏱️ How long is the wait?"],
    system:`You are the AI order assistant for Teranga Restaurant, an authentic Senegalese restaurant. Be warm, welcoming and helpful in English.

Menu:
MAINS: Thieboudienne (fish & rice) $18, Yassa Poulet (lemon chicken) $16, Mafé (peanut stew) $15, Thiebou Yapp (meat & rice) $17, Dibi (grilled lamb) $20
SIDES: Fried plantains $5, Salad $4, Bissap juice $4, Ginger juice $4
DESSERTS: Thiakry (millet dessert) $6

Hours: Mon-Sun 11am-10pm. Takeout ready in 20-30 mins. Delivery available. Dine-in welcome.

When customer orders: confirm items, give total price, estimated time, and ask for name and order type (dine-in/takeout/delivery). Then say: ORDER_CONFIRMED:[items]:[total]:[time]:[name]:[type]
Keep replies under 80 words. Plain text only.`
  },
  fr:{
    status:"Assistant IA · toujours disponible",
    placeholder:"Tapez votre commande ou question...",
    label:"Teranga IA",
    welcome:"Bienvenue au Restaurant Teranga! 🍽️ Je peux vous aider à passer une commande sur place, à emporter ou en livraison. Que désirez-vous aujourd'hui?",
    quick:["📋 Voir le menu","🥘 Commander Thiéboudiène","🍖 Commander Yassa Poulet","⏱️ Quel est le délai?"],
    system:`Tu es l'assistant IA du Restaurant Teranga, un restaurant sénégalais authentique. Sois chaleureux et serviable en français.

Menu:
PLATS: Thiéboudiène (poisson et riz) 18$, Yassa Poulet (poulet au citron) 16$, Mafé (ragoût d'arachide) 15$, Thiébou Yapp (viande et riz) 17$, Dibi (agneau grillé) 20$
ACCOMPAGNEMENTS: Alloco 5$, Salade 4$, Jus de bissap 4$, Jus de gingembre 4$
DESSERTS: Thiakry (dessert au mil) 6$

Horaires: Lun-Dim 11h-22h. Commandes à emporter prêtes en 20-30 min. Livraison disponible.

Quand le client commande: confirme les articles, donne le total, le temps estimé et demande le nom et type (sur place/à emporter/livraison). Puis dis: ORDER_CONFIRMED:[articles]:[total]:[temps]:[nom]:[type]
Moins de 80 mots. Texte simple uniquement.`
  },
  wo:{
    status:"AI ji · def ak yëgël ak jaamu",
    placeholder:"Bind sa commande walla laaj bu am...",
    label:"Teranga AI",
    welcome:"Dalal jaam ci Restaurant Teranga! 🍽️ Mën naa la ndimbal ngir commande bi — ci kër gi, à emporter, walla livraison. Lan nga bëgg tëy?",
    quick:["📋 Xool menu bi","🥘 Commande Ceebu Jën","🍖 Commande Yassa Ginaar","⏱️ Benn waxtu?"],
    system:`Yaa ngi représente Restaurant Teranga, restaurant sénégalais wi. Jaamu ak xam-xam ci Wolof.

Menu:
PLATS: Ceebu Jën 18$, Yassa Ginaar 16$, Mafé 15$, Ceebu Yapp 17$, Dibi 20$
COMPLÉMENTS: Alloco 5$, Salad 4$, Jus bissap 4$, Jus gingembre 4$
DESSERTS: Thiakry 6$

Waxtu: Altine-Dib 11h-22h. À emporter: 20-30 min. Livraison am na.

Bu client bi commande: xalaat li ñu bëgg, prix bi, waxtu bi, ci kanam laaj tur ak loolu (ci kër/à emporter/livraison). Ci kanam wax: ORDER_CONFIRMED:[articles]:[total]:[waxtu]:[tur]:[loolu]
Mots yu amul solo. Texte simple rekk.`
  }
};

function setLang(lang, btn){
  currentLang=lang;
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  hist=[];
  const L=LANGS[lang];
  document.getElementById("status-text").textContent=L.status;
  document.getElementById("inp").placeholder=L.placeholder;
  const cb=document.getElementById("chat-body");
  cb.innerHTML="";
  addBubble("bot",L.welcome);
  renderQuick();
}

function renderQuick(){
  const L=LANGS[currentLang];
  document.getElementById("quick-btns").innerHTML=L.quick.map(q=>`<button class="qbtn" onclick="send('${q}')">${q}</button>`).join("");
}

function addBubble(role,text){
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className=role==="bot"?"bw-bot":"bw-user";
  if(role==="bot"){const l=document.createElement("div");l.className="bl";l.textContent=LANGS[currentLang].label;w.appendChild(l);}
  const b=document.createElement("div");
  b.className=`bb bb-${role}`;
  b.textContent=text;
  w.appendChild(b);
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
}

function addOrderCard(items,total,time,name,type){
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className="bw-bot";
  const labels={
    en:{confirmed:"Order Confirmed!",sent:"Sent to kitchen",ready:"Ready in",name:"Name",type:"Order type",footer:"Your order is being prepared. Thank you!"},
    fr:{confirmed:"Commande Confirmée!",sent:"Envoyée en cuisine",ready:"Prête dans",name:"Nom",type:"Type",footer:"Votre commande est en préparation. Merci!"},
    wo:{confirmed:"Commande bi dafa set!",sent:"Def ko ci cuisine bi",ready:"Dëkk ci",name:"Tur",type:"Loolu",footer:"Commande bi def naa ko. Jërëjëf!"}
  };
  const L=labels[currentLang];
  w.innerHTML=`
    <div class="bl">${LANGS[currentLang].label}</div>
    <div class="order-card">
      <div style="font-size:14px;font-weight:700;color:#c17f24;margin-bottom:8px">✅ ${L.confirmed}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">🍽️ ${items}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">💰 Total: ${total}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">👤 ${L.name}: ${name}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:10px">📦 ${L.type}: ${type}</div>
      <div style="background:#1a0a00;border-radius:8px;padding:10px;text-align:center">
        <div style="font-size:20px;font-weight:700;color:#c17f24">⏱️ ${L.ready} ${time}</div>
        <div style="font-size:11px;color:#8a6a3a;margin-top:4px">${L.sent} 🍳</div>
      </div>
      <div style="font-size:11px;color:#8a6a3a;margin-top:8px;text-align:center">${L.footer}</div>
    </div>`;
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
}

async function send(txt){
  const inp=document.getElementById("inp");
  const t=txt||(inp?inp.value.trim():"");
  if(!t||busy)return;
  if(inp)inp.value="";
  addBubble("user",t);
  hist.push({role:"user",content:t});
  busy=true;
  const typing=document.createElement("div");
  typing.className="bw-bot";
  typing.id="typing";
  typing.innerHTML=`<div class="bl">${LANGS[currentLang].label}</div><div class="bb bb-bot" style="color:#8a6a3a">...</div>`;
  document.getElementById("chat-body").appendChild(typing);
  document.getElementById("chat-body").scrollTop=9999;
  try{
    const res=await fetch(BACKEND+"/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:LANGS[currentLang].system,messages:hist})
    });
    const d=await res.json();
    const raw=(d?.content?.[0]?.text||"...").replace(/\*\*(.*?)\*\*/g,"$1");
    const dm=raw.match(/ORDER_CONFIRMED:([^:]+):([^:]+):([^:]+):([^:]+):([^\n]+)/);
    const reply=raw.replace(/ORDER_CONFIRMED:[^\n]*/,"").trim();
    document.getElementById("typing")?.remove();
    hist.push({role:"assistant",content:raw});
    if(reply)addBubble("bot",reply);
    if(dm)addOrderCard(dm[1].trim(),dm[2].trim(),dm[3].trim(),dm[4].trim(),dm[5].trim());
  }catch(e){
    document.getElementById("typing")?.remove();
    addBubble("bot","Connection issue. Please try again.");
    hist.pop();
  }
  busy=false;
}

// Init
addBubble("bot",LANGS.en.welcome);
renderQuick();
</script>

</body>
</html>
