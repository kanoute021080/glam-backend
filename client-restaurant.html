<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Teranga Restaurant — Order Online</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#1a0a00;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;overflow-x:hidden}
.wrap{width:100%;max-width:420px}
.lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:10px}
.lang-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #c17f24;background:transparent;color:#c17f24;cursor:pointer;font-weight:500}
.lang-btn.active{background:#c17f24;color:#fff}
.chat-hdr{background:#2d1500;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0;border:1px solid #c17f24;border-bottom:none}
.av{width:38px;height:38px;border-radius:50%;background:#c17f24;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0}
.hdr-name{font-size:14px;font-weight:600;color:#f5e6c8}
.hdr-status{font-size:11px;color:#c17f24;display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c98a;display:inline-block}
.period-badge{font-size:10px;background:#c17f24;color:#fff;padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:600}
.chat-body{height:380px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#0d0500;border:1px solid #3d1f00;border-top:none}
.bw-bot{display:flex;flex-direction:column;align-items:flex-start}
.bw-user{display:flex;flex-direction:column;align-items:flex-end}
.bl{font-size:10px;color:#8a6a3a;margin-bottom:2px}
.bb{font-size:14px;line-height:1.6;padding:10px 14px;max-width:85%}
.bb-bot{background:#2d1500;color:#f5e6c8;border:1px solid #3d1f00;border-radius:4px 14px 14px 14px}
.bb-user{background:#c17f24;color:#fff;border-radius:14px 4px 14px 14px}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#0d0500;border:1px solid #3d1f00;border-top:none}
.qbtn{font-size:12px;padding:6px 12px;border:1px solid #c17f24;border-radius:20px;background:transparent;color:#c17f24;cursor:pointer}
.input-row{display:flex;gap:8px;padding:10px 12px;background:#2d1500;border:1px solid #c17f24;border-top:none;border-radius:0 0 12px 12px;align-items:center}
.inp{flex:1;font-size:14px;padding:9px 14px;border-radius:20px;border:1px solid #3d1f00;background:#0d0500;color:#f5e6c8;outline:none}
.inp::placeholder{color:#8a6a3a}
.send-btn{width:38px;height:38px;border-radius:50%;background:#c17f24;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.order-card{background:#2d1500;border:1px solid #c17f24;border-radius:12px;padding:14px;max-width:88%}
.footer{text-align:center;font-size:11px;color:#8a6a3a;margin-top:10px}
.footer a{color:#c17f24;text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en',this)">🇺🇸 English</button>
    <button class="lang-btn" onclick="setLang('fr',this)">🇫🇷 Français</button>
    <button class="lang-btn" onclick="setLang('wo',this)">🇸🇳 Wolof</button>
  </div>

  <div class="chat-hdr">
    <div class="av">TR</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center">
        <div class="hdr-name" id="restaurant-name">Teranga Restaurant</div>
        <span class="period-badge" id="period-badge">Lunch</span>
      </div>
      <div class="hdr-status"><span class="dot"></span><span id="status-text">AI assistant · always open</span></div>
    </div>
  </div>

  <div class="chat-body" id="chat-body"></div>
  <div class="quick-btns" id="quick-btns"></div>

  <div class="input-row">
    <input class="inp" id="inp" placeholder="Type your order..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="send-btn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer">
    Powered by <a href="https://dianke.ai">Dianke.ai</a> ·
    <span onclick="openOrderStatus()" style="color:#c17f24;cursor:pointer;font-weight:600;display:inline-block;padding:4px 0" id="check-order-link">Check my order →</span>
  </div>

  <!-- Order status modal -->
  <div id="order-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;padding:20px">
    <div style="background:#2d1500;border:1px solid #c17f24;border-radius:14px;padding:20px;width:100%;max-width:380px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:600;color:#f5e6c8" id="modal-title">Check my order</div>
        <button onclick="closeOrderStatus()" style="background:none;border:none;font-size:20px;color:#8a6a3a;cursor:pointer">×</button>
      </div>
      <div id="order-search">
        <label style="font-size:12px;color:#8a6a3a;display:block;margin-bottom:4px" id="modal-label">Your name</label>
        <input id="order-name" placeholder="Enter the name used to order" style="width:100%;font-size:14px;padding:9px 12px;border:1px solid #3d1f00;border-radius:8px;outline:none;margin-bottom:10px;background:#0d0500;color:#f5e6c8"/>
        <button onclick="checkOrderStatus()" style="width:100%;padding:10px;background:#c17f24;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer" id="modal-btn">Check status</button>
      </div>
      <div id="order-result" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const BACKEND="https://dianke.ai";
const salonId=window.location.pathname.split("/")[2]||"restaurant1";
let hist=[], busy=false, currentLang="en", menuData=null, currentPeriod=null, restaurantPhone=null, restaurantName="Teranga Restaurant";


const LANGS={
  en:{
    status:"AI assistant · always open",
    placeholder:"Type your order or question...",
    label:"Afghan Kababs AI",
    periods:{breakfast:"Breakfast",lunch:"Lunch",dinner:"Dinner"},
    quick:["📋 See menu","🛵 Delivery available?","⏱️ Wait time?","📞 Call us"],
  },
  fr:{
    status:"Assistant IA · toujours disponible",
    placeholder:"Tapez votre commande...",
    label:"Teranga IA",
    periods:{breakfast:"Petit-déjeuner",lunch:"Déjeuner",dinner:"Dîner"},
    quick:["📋 Voir le menu","🛵 Livraison?","⏱️ Délai d'attente?","📞 Nous appeler"],
  },
  wo:{
    status:"AI ji · def ak yëgël",
    placeholder:"Bind sa commande...",
    label:"Afghan Kababs AI",
    periods:{breakfast:"Petit-déjeuner",lunch:"Déjeuner",dinner:"Dîner"},
    quick:["📋 Xool menu bi","🛵 Livraison am?","⏱️ Benn waxtu?","📞 Woo leen"],
  }
};

const ORDER_LABELS={
  en:{title:"Check my order",label:"Your name",btn:"Check status",notfound:"No order found",notfound_sub:"We couldn't find an order under that name.",tryagain:"Try again",pending:"Preparing",confirmed:"Confirmed, in kitchen",ready:"Ready for pickup",done:"Completed",noPhone:"Sorry — phone number isn't available right now. Please order through chat."},
  fr:{title:"Vérifier ma commande",label:"Votre nom",btn:"Vérifier",notfound:"Commande introuvable",notfound_sub:"Nous n'avons pas trouvé de commande sous ce nom.",tryagain:"Réessayer",pending:"En préparation",confirmed:"Confirmée, en cuisine",ready:"Prête à récupérer",done:"Terminée",noPhone:"Désolé — le numéro n'est pas disponible. Veuillez commander par chat."},
  wo:{title:"Xool sa commande",label:"Sa tur",btn:"Xool",notfound:"Commande bi amul",notfound_sub:"Xoolul commande bu am sa tur.",tryagain:"Saytu",pending:"Def nanu ko",confirmed:"Wone na, ci cuisine",ready:"Sett na, jëlël",done:"Mat na",noPhone:"Numéro bi amul leegi. Bind ci chat bi."}
};

function buildSystem(menu, period){
  const items=menu.map(i=>`${i.name}: $${i.price}`).join(", ");
  const periodName=LANGS[currentLang].periods[period]||period;
  if(currentLang==="fr") return `Tu es l'assistant IA de ${restaurantName}. Sois chaleureux en français.\nMenu ${periodName}: ${items}\nHoraires: 11h-22h. À emporter: 20-30 min. Livraison disponible. Sur place bienvenu.\nQuand client commande: confirme articles, total, temps estimé, demande nom, type (sur place/à emporter/livraison), et demande son email pour être prévenu quand prêt (optionnel — accepte s'il refuse). Puis: ORDER_CONFIRMED:[articles]:[total]:[temps]:[nom]:[type]:[email-ou-vide]\nMoins de 90 mots. Texte simple.`;
  if(currentLang==="wo") return `Yaa ngi représente ${restaurantName} ci Wolof.\nMenu ${periodName}: ${items}\nWaxtu: 11h-22h. À emporter: 20-30 min. Livraison am na.\nBu client bi commande: xalaat li, prix, waxtu, laaj tur, loolu (sur place/à emporter/livraison), ak laaj email pour yëgël ko bu sett (optionnel). Ci kanam: ORDER_CONFIRMED:[articles]:[total]:[waxtu]:[tur]:[loolu]:[email-walla-tuuti]\nMots yu amul solo. Texte simple.`;
  return `You are the AI order assistant for ${restaurantName}. Be warm in English.\n${periodName} Menu: ${items}\nHours: 11am-10pm. Takeout: 20-30 mins. Delivery available. Dine-in welcome.\nWhen customer orders: confirm items, total, estimated time, ask name, order type (dine-in/takeout/delivery), and ask for a phone number so we can notify them when their order is ready (optional — accept "no thanks" gracefully). Then: ORDER_CONFIRMED:[items]:[total]:[time]:[name]:[type]:[phone-or-empty]\nIf the customer declines, leave the phone segment empty (still output the trailing colon). Under 90 words. Plain text only.`;

}

function buildWelcome(menu, period){
  const periodName=LANGS[currentLang].periods[period]||period;
  const featured=menu.slice(0,3).map(i=>i.name).join(", ");
  if(currentLang==="fr") return `Bienvenue chez ${restaurantName}! 🍽️ Nous servons notre menu ${periodName}. En vedette: ${featured}. Comment puis-je vous aider?`;
  if(currentLang==="wo") return `Dalal jaam ci ${restaurantName}! 🍽️ Lëndëm ${periodName} la ñu def tëy. Ci kanam: ${featured}. Lan nga bëgg?`;
  return `Welcome to ${restaurantName}! 🍽️ We're currently serving our ${periodName} menu. Featured: ${featured}. How can I help you?`;
}

// Loads the active period from the server — no period arg means server decides
async function loadMenu(){
  try{
    const res=await fetch(BACKEND+"/menu/"+salonId, {cache:"no-store"});
    const d=await res.json();
    menuData=d;
    currentPeriod=d.period;
    const L=LANGS[currentLang];
    const periodName=L.periods[d.period]||d.period;
    document.getElementById("period-badge").textContent=periodName;
    document.getElementById("chat-body").innerHTML="";
    hist=[];
    addBubble("bot",buildWelcome(d.items,d.period));
    renderQuick();
  }catch(e){
    menuData={items:[],period:"lunch"};
    addBubble("bot",`Welcome to ${restaurantName}! How can I help you today?`);
    renderQuick();
  }
}

function setLang(lang,btn){
  currentLang=lang;
  document.querySelectorAll(".lang-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("status-text").textContent=LANGS[lang].status;
  document.getElementById("inp").placeholder=LANGS[lang].placeholder;
  // reload using the server's current active period
  loadMenu();
}

function renderQuick(){
  const L=LANGS[currentLang];
  document.getElementById("quick-btns").innerHTML=L.quick.map(q=>{
    if(q.indexOf("📞")!==-1) return `<button class="qbtn" onclick="callUs()">${q}</button>`;
    return `<button class="qbtn" onclick="send('${q.replace(/'/g,"\\'")}')">${q}</button>`;
  }).join("");
}
    async function loadSettings(){
  try{
    const res=await fetch(BACKEND+"/restaurant-settings/"+salonId, {cache:"no-store"});
    
    const d=await res.json();
    const rName=d.salon_name||null;
    restaurantPhone=d.phone||null;
    if(rName){
      restaurantName=rName;
      document.getElementById("restaurant-name").textContent=rName;
      const initials=rName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
      const av=document.getElementById("restaurant-av");
      if(av) av.textContent=initials;
      document.title=rName+" — Order Online";
      Object.keys(LANGS).forEach(l=>{LANGS[l].label=rName+" AI";});
    }
  }catch{}
}

function callUs(){
  const L=ORDER_LABELS[currentLang];
  if(restaurantPhone){
    const clean=String(restaurantPhone).replace(/[^0-9+]/g,"");
    addBubble("bot","📞 "+restaurantPhone);
    window.location.href="tel:"+clean;
  } else {
    addBubble("bot",L.noPhone);
  }
}

// ─── ORDER-READY NOTIFICATIONS ───────────────────────
const READY_LABELS={
  en:{
    title:"🔔 Your order is ready!",
    notifTitle:"Your order is ready! 🍽️",
    sub:{
      takeout:"Come pick it up at the counter.",
      "dine-in":"Your food is on its way to your table!",
      delivery:"Your order is on its way to you! 🛵"
    }
  },
  fr:{
    title:"🔔 Votre commande est prête!",
    notifTitle:"Votre commande est prête! 🍽️",
    sub:{
      takeout:"Venez la chercher au comptoir.",
      "dine-in":"Votre repas arrive à votre table!",
      delivery:"Votre commande est en route! 🛵"
    }
  },
  wo:{
    title:"🔔 Sa commande sett na!",
    notifTitle:"Sa commande sett na! 🍽️",
    sub:{
      takeout:"Ñëw ko jëlël ci comptoir bi.",
      "dine-in":"Dinañu ko dëkk ci sa tabël!",
      delivery:"Sa commande dafa dem yoon! 🛵"
    }
  }
};

let pollTimer=null, watchedOrderId=null, watchedCustomerName=null, lastStatus=null;

function requestNotifPermission(){
  if(!("Notification" in window)) return;
  if(Notification.permission==="default"){
    try{ Notification.requestPermission(); }catch{}
  }
}

function fireReadyAlerts(order){
  const L=READY_LABELS[currentLang]||READY_LABELS.en;
  const orderType=(order.order_type||"takeout").toLowerCase();
  const subMsg=L.sub[orderType]||L.sub.takeout;
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className="bw-bot";
  w.innerHTML=`
    <div class="bl">${LANGS[currentLang].label}</div>
    <div class="order-card" style="border-color:#22c98a;background:#0e2d1a">
      <div style="font-size:15px;font-weight:700;color:#22c98a;margin-bottom:6px">${L.title}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:6px">${order.items||""}</div>
      <div style="font-size:12px;color:#a8d5b8">${subMsg}</div>
    </div>`;
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
  if("Notification" in window && Notification.permission==="granted"){
    try{ new Notification(L.notifTitle,{body:order.items||"",tag:"order-"+order.id}); }catch{}
  }
  if("vibrate" in navigator) try{ navigator.vibrate([200,80,200]); }catch{}
}

async function pollOrderStatus(){
  if(!watchedOrderId||!watchedCustomerName){ clearInterval(pollTimer); pollTimer=null; return; }
  try{
    const res=await fetch(`${BACKEND}/orders/search?name=${encodeURIComponent(watchedCustomerName)}&salon_id=${salonId}`,{cache:"no-store"});
    const orders=await res.json();
    if(!Array.isArray(orders)) return;
    const o=orders.find(x=>x.id===watchedOrderId);
    if(!o||o.status===lastStatus) return;
    lastStatus=o.status;
    if(o.status==="ready") fireReadyAlerts(o);
    if(o.status==="ready"||o.status==="done"||o.status==="cancelled"){ clearInterval(pollTimer); pollTimer=null; }
  }catch{}
}

function startOrderPolling(orderId, customerName){
  if(!orderId||!customerName) return;
  watchedOrderId=orderId;
  watchedCustomerName=customerName;
  lastStatus="pending";
  if(pollTimer) clearInterval(pollTimer);
  setTimeout(pollOrderStatus, 8000);
  pollTimer=setInterval(pollOrderStatus, 12000);
}

function addBubble(role,text){
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className=role==="bot"?"bw-bot":"bw-user";
  if(role==="bot"){const l=document.createElement("div");l.className="bl";l.textContent=LANGS[currentLang].label;w.appendChild(l);}
  const b=document.createElement("div");
  b.className=`bb bb-${role}`;
  b.textContent=text;
  w.appendChild(b);
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
}

  function addOrderCard(items,total,time,name,type,phone){
    const el=document.getElementById("chat-body");
    const w=document.createElement("div");
    w.className="bw-bot";
    const labels={
      en:{
        confirmed:"Order Confirmed!",kitchen:"Sent to kitchen 🍳",ready:"Ready in",
        notifyEmail:"📧 We'll email you when it's ready",orderNum:"Your order number",
        footer:{takeout:"Show this number when you pick up.",
                "dine-in":"Sit back — your food will be brought to you!",
                delivery:"Your order will be delivered to you 🛵"}
      },
      fr:{
        confirmed:"Commande Confirmée!",kitchen:"Envoyée en cuisine 🍳",ready:"Prête dans",
        notifyEmail:"📧 Nous vous enverrons un email quand prête",orderNum:"Votre numéro de commande",
        footer:{takeout:"Montrez ce numéro au comptoir.",
                "dine-in":"Restez assis — votre repas vous sera apporté!",
                delivery:"Votre commande vous sera livrée 🛵"}
      },
    wo:{
      confirmed:"Commande bi dafa set!",kitchen:"Def ko ci cuisine bi 🍳",ready:"Dëkk ci",
      notifyEmail:"📧 Dinañu yónni email bu sett",orderNum:"Numéro commande bi",
      footer:{takeout:"Yëgël numéro bi bu nga ñëw.",
              "dine-in":"Dëgël — dinañu ko indi ci sa tabël!",
              delivery:"Dinañu ko indi ci sa adresse 🛵"}
    }
  };
  const L=labels[currentLang];
  const footerMsg=L.footer[(type||"takeout").toLowerCase()]||L.footer.takeout;
  // Render card with placeholder — real order number filled in after server responds
  w.innerHTML=`
    <div class="bl">${LANGS[currentLang].label}</div>
    <div class="order-card">
      <div style="font-size:14px;font-weight:700;color:#c17f24;margin-bottom:8px">✅ ${L.confirmed}</div>
      <div style="background:#1a0a00;border-radius:10px;padding:12px;text-align:center;margin-bottom:10px;border:1px solid #c17f24">
        <div style="font-size:11px;color:#8a6a3a;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">${L.orderNum}</div>
        <div id="order-num-display" style="font-size:32px;font-weight:700;color:#c17f24;letter-spacing:2px">...</div>
      </div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">🍽️ ${items}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">💰 Total: ${total}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:10px">👤 ${name} · ${type}</div>
      <div style="background:#1a0a00;border-radius:8px;padding:10px;text-align:center;margin-bottom:8px">
        <div style="font-size:22px;font-weight:700;color:#c17f24">⏱️ ${L.ready} ${time}</div>
        <div style="font-size:11px;color:#8a6a3a;margin-top:4px">${L.kitchen}</div>
      </div>
      ${phone?`<div style="font-size:11px;color:#22c98a;text-align:center;margin-bottom:6px">📱 We'll WhatsApp you when it's ready</div>`:""}
      <div style="font-size:11px;color:#8a6a3a;text-align:center">${footerMsg}</div>
    </div>`;
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
  requestNotifPermission();
  fetch(BACKEND+"/orders",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({customer_name:name,customer_phone:phone||null,items,total:parseFloat(String(total).replace(/[^0-9.]/g,"")),order_type:type,estimated_time:time,salon_id:salonId,source:"chat",language:currentLang,status:"pending"})
  }).then(r=>r.json()).then(d=>{
    if(d&&d.id) startOrderPolling(d.id,name);
    // Fill in the real order number once server responds
    const numEl=w.querySelector("#order-num-display");
    if(numEl) numEl.textContent=d&&d.order_number?"#"+d.order_number:"#"+Math.floor(1000+Math.random()*9000);
  }).catch(e=>console.error("Order error:",e));
}
let cartItems=[];

function showVisualMenu(){
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className="bw-bot";
  const items=menuData.items.map((i,idx)=>`
    <div class="menu-item-row" data-idx="${idx}" onclick="toggleMenuItem(${idx})" style="display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #3d1f00;cursor:pointer;border-radius:8px;transition:background .15s">
      ${i.image_url?`<img src="${i.image_url}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'"/>`:`<div style="width:56px;height:56px;border-radius:8px;background:#3d1f00;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px">🍽️</div>`}
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600;color:#f5e6c8">${i.name}</div>
        <div style="font-size:12px;color:#c17f24;font-weight:700">$${i.price}</div>
      </div>
      <div id="check-${idx}" style="width:22px;height:22px;border-radius:50%;border:2px solid #c17f24;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff"></div>
    </div>
  `).join("");
  const title=currentLang==="fr"?"Notre menu — touchez pour commander":currentLang==="wo"?"Menu bi — borom ko":"Our menu — tap to order";
  const orderTxt=currentLang==="fr"?"Commander la sélection":currentLang==="wo"?"Yónni":"Order selection";
  w.innerHTML=`<div class="bl">${LANGS[currentLang].label}</div><div class="order-card" style="max-width:96%;padding:12px"><div style="font-size:13px;font-weight:700;color:#c17f24;margin-bottom:8px">📋 ${title}</div><div id="menu-list">${items}</div><button id="order-selection-btn" onclick="orderSelection()" style="display:none;width:100%;margin-top:10px;padding:10px;background:#c17f24;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer">${orderTxt}</button></div>`;
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
  cartItems=[];
}

function toggleMenuItem(idx){
  const row=document.querySelector(`.menu-item-row[data-idx="${idx}"]`);
  const check=document.getElementById(`check-${idx}`);
  const i=cartItems.indexOf(idx);
  if(i===-1){
    cartItems.push(idx);
    check.textContent="✓";
    check.style.background="#c17f24";
    row.style.background="rgba(193,127,36,0.12)";
  }else{
    cartItems.splice(i,1);
    check.textContent="";
    check.style.background="transparent";
    row.style.background="transparent";
  }
  const btn=document.getElementById("order-selection-btn");
  if(btn) btn.style.display=cartItems.length?"block":"none";
}

function orderSelection(){
  const names=cartItems.map(idx=>menuData.items[idx].name);
  const text=(currentLang==="fr"?"Je voudrais commander: ":currentLang==="wo"?"Dama bëgg: ":"I'd like to order: ")+names.join(", ");
  document.querySelectorAll(".bw-bot").forEach(w=>{ if(w.querySelector("#menu-list")) w.remove(); });
  send(text);
}
  async function send(txt){
  const inp=document.getElementById("inp");
  const t=txt||(inp?inp.value.trim():"");
  if(!t||busy)return; if(!menuData) menuData={items:[],period:"lunch"};
  if(inp)inp.value="";
  addBubble("user",t);
hist.push({role:"user",content:t});

// ── Visual menu display ──
if(/see menu|voir le menu|xool menu/i.test(t.replace(/[^\w\s]/g,"")) && menuData?.items?.length){
  showVisualMenu();
  busy=false;
  return;
}

busy=true;
  const typing=document.createElement("div");
  typing.className="bw-bot";
  typing.id="typing";
  typing.innerHTML=`<div class="bl">${LANGS[currentLang].label}</div><div class="bb bb-bot" style="color:#8a6a3a">...</div>`;
  document.getElementById("chat-body").appendChild(typing);
  document.getElementById("chat-body").scrollTop=9999;
  try{
    const res=await fetch(BACKEND+"/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:buildSystem(menuData.items,menuData.period),messages:hist})
    });
    const d=await res.json();
    const raw=(d?.content?.[0]?.text||"...").replace(/\*\*(.*?)\*\*/g,"$1");
    const dm=raw.match(/ORDER_CONFIRMED:([^:\n]+):([^:\n]+):([^:\n]+):([^:\n]+):([^:\n]+)(?::([^\n]*))?/);
    const reply=raw.replace(/ORDER_CONFIRMED:[^\n]*/,"").trim();
    document.getElementById("typing")?.remove();
    hist.push({role:"assistant",content:raw});
    if(reply)addBubble("bot",reply);
   if(dm){
      const phoneRaw=(dm[6]||"").trim();
      const phone=/\d{7,}/.test(phoneRaw)?phoneRaw:"";
      addOrderCard(dm[1].trim(),dm[2].trim(),dm[3].trim(),dm[4].trim(),dm[5].trim(),phone);
    }
  }catch(e){
    document.getElementById("typing")?.remove();
    addBubble("bot","Connection issue. Please try again.");
    hist.pop();
  }
  busy=false;
}

// ─── CHECK MY ORDER ──────────────────────────────────
function openOrderStatus(){
  const L=ORDER_LABELS[currentLang];
  document.getElementById("order-modal").style.display="flex";
  document.getElementById("modal-title").textContent=L.title;
  document.getElementById("modal-label").textContent=L.label;
  document.getElementById("modal-btn").textContent=L.btn;
  document.getElementById("order-name").value="";
  document.getElementById("order-result").style.display="none";
  document.getElementById("order-search").style.display="block";
}

function closeOrderStatus(){
  document.getElementById("order-modal").style.display="none";
}

async function checkOrderStatus(){
  const name=document.getElementById("order-name").value.trim();
  if(!name) return;
  const L=ORDER_LABELS[currentLang];
  const result=document.getElementById("order-result");
  const search=document.getElementById("order-search");
  search.style.display="none";
  result.style.display="block";
  result.innerHTML=`<div style="text-align:center;padding:20px;color:#8a6a3a;font-size:13px">...</div>`;
  try{
    const res=await fetch(`${BACKEND}/orders/search?name=${encodeURIComponent(name)}&salon_id=${salonId}`,{cache:"no-store"});
    const orders=await res.json();
    if(!Array.isArray(orders)||orders.length===0){
      result.innerHTML=`
        <div style="text-align:center;padding:10px 0">
          <div style="font-size:32px;margin-bottom:8px">🔍</div>
          <div style="font-size:14px;font-weight:600;color:#f5e6c8;margin-bottom:6px">${L.notfound}</div>
          <div style="font-size:13px;color:#8a6a3a;margin-bottom:14px">${L.notfound_sub}</div>
          <button onclick="document.getElementById('order-search').style.display='block';document.getElementById('order-result').style.display='none'" style="width:100%;padding:9px;background:transparent;color:#c17f24;border:1px solid #c17f24;border-radius:8px;font-size:13px;cursor:pointer">${L.tryagain}</button>
        </div>`;
      return;
    }
    const o=orders[0];
    const statusMap={
      pending:{icon:"⏳",label:L.pending,color:"#c17f24"},
      confirmed:{icon:"👨‍🍳",label:L.confirmed,color:"#c17f24"},
      ready:{icon:"🔔",label:L.ready,color:"#22c98a"},
      done:{icon:"✅",label:L.done,color:"#8a6a3a"}
    };
    const s=statusMap[o.status]||statusMap.pending;
    const totalDisplay=(o.total!=null&&o.total!=="")?"$"+o.total:"";
    result.innerHTML=`
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:32px;margin-bottom:8px">${s.icon}</div>
        <div style="font-size:15px;font-weight:600;color:#f5e6c8;margin-bottom:4px">${o.items||"Your order"}</div>
        <div style="font-size:13px;color:#8a6a3a;margin-bottom:4px">${o.customer_name||""}${o.order_type?" · "+o.order_type:""}</div>
        ${totalDisplay?`<div style="font-size:12px;color:#8a6a3a;margin-bottom:10px">${totalDisplay}${o.estimated_time?" · ETA "+o.estimated_time:""}</div>`:`<div style="margin-bottom:10px"></div>`}
        <span style="font-size:12px;padding:4px 14px;border-radius:20px;font-weight:600;background:rgba(193,127,36,0.15);color:${s.color}">${s.label}</span>
        <button onclick="closeOrderStatus()" style="display:block;width:100%;margin-top:14px;padding:9px;background:#c17f24;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Close</button>
      </div>`;
  }catch{
    result.innerHTML=`<div style="text-align:center;padding:10px;color:#8a6a3a;font-size:13px">Could not load. Try again.</div>`;
  }
}

loadSettings().then(()=>loadMenu());
</script>
