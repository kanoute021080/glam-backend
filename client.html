<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Crown & Glory Beauty</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#f5f5f3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;overflow-x:hidden}
.wrap{width:100%;max-width:420px}
.chat-hdr{background:#111;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0}
.av{width:36px;height:36px;border-radius:50%;background:#c2426e;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0}
.hdr-name{font-size:14px;font-weight:600;color:#f0f0ec}
.hdr-status{font-size:11px;color:#7dd9b8;display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c98a;display:inline-block}
.chat-body{height:420px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#f5f5f3;border:1px solid #eee;border-top:none}
.bubble-wrap{display:flex;flex-direction:column}
.bubble-wrap.bot{align-items:flex-start}
.bubble-wrap.user{align-items:flex-end}
.bubble-label{font-size:10px;color:#aaa;margin-bottom:2px}
.bubble{font-size:14px;line-height:1.6;padding:10px 14px;max-width:85%}
.bubble.bot{background:#fff;color:#111;border:1px solid #eee;border-radius:4px 14px 14px 14px}
.bubble.user{background:#111;color:#f0f0ec;border-radius:14px 4px 14px 14px}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#f5f5f3;border:1px solid #eee;border-top:none}
.qbtn{font-size:12px;padding:6px 12px;border:1px solid #ddd;border-radius:20px;background:#fff;color:#444;cursor:pointer}
.qbtn:active{background:#eee}
.input-row{display:flex;gap:8px;padding:10px 12px;background:#fff;border:1px solid #eee;border-top:none;border-radius:0 0 12px 12px;align-items:center}
.inp{flex:1;font-size:14px;padding:9px 14px;border-radius:20px;border:1px solid #ddd;background:#f5f5f3;color:#111;outline:none}
.send-btn{width:38px;height:38px;border-radius:50%;background:#c2426e;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pay-card{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-top:4px;max-width:88%}
.pay-link{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;text-decoration:none;margin-bottom:6px}
.footer{text-align:center;font-size:11px;color:#aaa;margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <div class="chat-hdr">
    <div class="av" id="salon-av">CG</div>
    <div>
      <div class="hdr-name" id="salon-name">Crown & Glory Beauty</div>
      <div class="hdr-status"><span class="dot"></span>AI receptionist · always open</div>
    </div>
  </div>

  <div class="chat-body" id="chat-body"></div>

  <div class="quick-btns">
    <button class="qbtn" onclick="send('Book an appointment')">📅 Book appointment</button>
    <button class="qbtn" onclick="send('What are your prices?')">💰 Prices</button>
    <button class="qbtn" onclick="send('Are you free Friday?')">📆 Availability</button>
    <button class="qbtn" onclick="send('How long for braids?')">⏱ Duration</button>
  </div>

  <div class="input-row">
    <input class="inp" id="inp" placeholder="Type a message..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="send-btn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#fff"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer">
    Powered by AutoPilot Reception · 
    <span onclick="openStatus()" style="color:#c2426e;cursor:pointer;font-weight:600">Check my booking →</span>
  </div>
  
  <div id="status-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;align-items:center;justify-content:center;padding:20px">
    <div style="background:#fff;border-radius:14px;padding:20px;width:100%;max-width:380px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:600;color:#111">Check booking status</div>
        <button onclick="closeStatus()" style="background:none;border:none;font-size:20px;color:#aaa;cursor:pointer">×</button>
      </div>
      <div id="status-search">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">Your name</label>
        <input id="status-name" placeholder="Enter the name used to book" style="width:100%;font-size:14px;padding:9px 12px;border:1px solid #ddd;border-radius:8px;outline:none;margin-bottom:10px"/>
        <button onclick="checkStatus()" style="width:100%;padding:10px;background:#111;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">Check status</button>
      </div>
      <div id="status-result" style="display:none"></div>
    </div>
  </div>
</div>

<script>
const BACKEND="https://glam-backend-rxdf.onrender.com";
const fmt=h=>h<12?h+"am":h===12?"12pm":(h-12)+"pm";
let hist=[];
let busy=false;

// Settings loaded from backend
let PAY={cashapp:"",venmo:"",zelle:""};
let depositMode="required";
let SYS="";

async function loadSettings(){
  const salonId=window.location.pathname.split("/").filter(Boolean).pop()||"salon1";
  try{
    const res=await fetch(`${BACKEND}/settings/${salonId}`);
    if(!res.ok) throw new Error();
    const d=await res.json();
    document.getElementById("salon-name").textContent = d.salon_name || "Our Salon";
    const initials = d.salon_name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
    document.getElementById("salon-av").textContent = initials;
    depositMode=d.deposit_mode||"required";
    PAY={cashapp:d.cashapp||"",venmo:d.venmo||"",zelle:d.zelle||""};
    const depositAmount=d.deposit_amount||35;
    const depositText=depositMode==="none"
      ?"No deposit required to book."
      :depositMode==="optional"
        ?`A $${depositAmount} deposit is optional but recommended to secure your slot.`
        :`A $${depositAmount} deposit is required to secure your slot.`;
    const depositInstruction=depositMode==="none"
      ?"Once all info confirmed say exactly: BOOKING_CONFIRMED:[service]:[day]:[time]:[name]"
      :`Once all info confirmed say exactly: DEPOSIT_DUE:$${depositAmount}:[service]:[day]:[time]:[name]`;
    SYS=`You are the AI receptionist for ${d.salon_name||"this salon"} in ${d.location||"the local area"}. Be warm, friendly and concise.
Services: ${d.services||"Ask the stylist for current services and pricing."}
Hours: ${d.hours||"Call us for current hours."} ${depositText} Come with clean detangled hair.
Availability: ${d.availability||"Contact us to check availability."}
Remember the full conversation. Never restart. Collect service, day, time (use format like 9am, 10am, 2pm), client name. ${depositInstruction}
Keep replies under 80 words. Plain text only. No asterisks.`;
    addBubble("bot",`Hey! Welcome to ${d.salon_name||"our salon"}. I can help you book an appointment, check availability, or answer any questions. What can I do for you today?`);
  }catch{
    depositMode="required";
    SYS=`You are an AI receptionist for a hair salon. Be warm and helpful. Collect service, day, time, and client name. Once confirmed say: DEPOSIT_DUE:$35:[service]:[day]:[time]:[name]. Keep replies under 80 words. Plain text only.`;
    addBubble("bot","Hey! Welcome. I can help you book an appointment, check availability, or answer any questions. What can I do for you today?");
  }
}


function addBubble(role,text){
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className=`bubble-wrap ${role}`;
  if(role==="bot"){const l=document.createElement("div");l.className="bubble-label";l.textContent="Glam AI";w.appendChild(l);}
  const b=document.createElement("div");
  b.className=`bubble ${role}`;
  b.textContent=text;
  w.appendChild(b);
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
}

function addPayCard(svc,day,time,client){
  const el=document.getElementById("chat-body");
  const w=document.createElement("div");
  w.className="bubble-wrap bot";
  w.innerHTML=`
    <div class="bubble-label">Glam AI</div>
    <div class="pay-card">
      <div style="font-size:13px;font-weight:600;color:#111;margin-bottom:3px">Send $35 deposit to confirm</div>
      <div style="font-size:12px;color:#888;margin-bottom:12px">${svc} · ${day} at ${time} · ${client}</div>
      <a href="https://cash.app/${PAY.cashapp}" target="_blank" class="pay-link" style="background:#1a9e3f">
        <span style="font-size:16px;color:#fff;font-weight:700">$</span>
        <div><div style="font-size:13px;font-weight:600;color:#fff">Cash App</div><div style="font-size:11px;color:#a8f0bc">${PAY.cashapp}</div></div>
      </a>
      <a href="https://venmo.com/${PAY.venmo.replace("@","")}" target="_blank" class="pay-link" style="background:#3d95ce">
        <span style="font-size:16px;color:#fff;font-weight:700">V</span>
        <div><div style="font-size:13px;font-weight:600;color:#fff">Venmo</div><div style="font-size:11px;color:#b8dff5">${PAY.venmo}</div></div>
      </a>
      <div class="pay-link" style="background:#6B2D8B">
        <span style="font-size:16px;color:#fff;font-weight:700">Z</span>
        <div><div style="font-size:13px;font-weight:600;color:#fff">Zelle</div><div style="font-size:11px;color:#dbb8f0">${PAY.zelle}</div></div>
      </div>
      <div style="font-size:11px;color:#aaa;margin-top:10px">Include your name in the memo. Your slot is held for 2 hours pending deposit.</div>
    </div>`;
  el.appendChild(w);
  el.scrollTop=el.scrollHeight;
}

async function send(txt){
  const inp=document.getElementById("inp");
  const t=txt||(inp?inp.value.trim():"");
  if(!t||busy)return;
  if(inp)inp.value="";
  addBubble("user",t);
  hist.push({role:"user",content:t});
  busy=true;
  const typing=document.createElement("div");
  typing.className="bubble-wrap bot";
  typing.id="typing";
  typing.innerHTML='<div class="bubble-label">Glam AI</div><div class="bubble bot" style="color:#aaa">typing...</div>';
  document.getElementById("chat-body").appendChild(typing);
  document.getElementById("chat-body").scrollTop=9999;
  try{
    const res=await fetch(BACKEND+"/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:SYS,messages:hist})
    });
    const d=await res.json();
    const raw=(d?.content?.[0]?.text||"Try again!").replace(/\*\*(.*?)\*\*/g,"$1");
    const dm=raw.match(/DEPOSIT_DUE:\$(\d+):([^:]+):([^:]+):([^:]+):(.+)/);
    const bc=raw.match(/BOOKING_CONFIRMED:([^:]+):([^:]+):([^:]+):([^\n]+)/);
    const reply=raw.replace(/DEPOSIT_DUE:[^\n]*/,"").replace(/BOOKING_CONFIRMED:[^\n]*/,"").trim();
    document.getElementById("typing")?.remove();
    hist.push({role:"assistant",content:raw});
    if(reply)addBubble("bot",reply);
    if(dm){
      const svc=dm[2].trim(), day=dm[3].trim(), time=dm[4].trim(), client=dm[5].trim();
      fetch(BACKEND+"/bookings",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({client,service:svc,day,time,amount:0,salon_id:window.location.pathname.split("/")[2]||"default"})
      }).then(r=>r.json()).then(b=>{
        clientBookings.push({...b,time});
      }).catch(()=>{
        clientBookings.push({client,service:svc,day,time,status:"pending",deposit:false,id:Date.now()});
      });
      if(depositMode==="optional"){
        addPayCard(svc,day,time,client);
        addBubble("bot","A deposit is optional but helps secure your slot. You can pay above or just show up — we'll do our best to hold it for you!");
      } else {
        addPayCard(svc,day,time,client);
      }
    }
    if(bc){
      const svc=bc[1].trim(), day=bc[2].trim(), time=bc[3].trim(), client=bc[4].trim();
      fetch(BACKEND+"/bookings",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({client,service:svc,day,time,amount:0,salon_id:window.location.pathname.split("/")[2]||"default"})
      }).catch(()=>{});
      clientBookings.push({client,service:svc,day,time,status:"confirmed",deposit:false,id:Date.now()});
      addBubble("bot","Your appointment is confirmed! We look forward to seeing you 💅");
    }
  }catch{
    document.getElementById("typing")?.remove();
    const el=document.getElementById("chat-body");
    const w=document.createElement("div");
    w.className="bubble-wrap bot";
    w.innerHTML=`<div class="bubble-label">Glam AI</div><div class="bubble bot" style="color:#888">Having trouble connecting. <span style="color:#c2426e;cursor:pointer;font-weight:600" onclick="send('${t.replace(/'/g,"\\'")}')">Tap to retry →</span></div>`;
    el.appendChild(w);
    el.scrollTop=el.scrollHeight;
    hist.pop();
  }
  busy=false;
}

// Booking status check
let clientBookings=[];

function openStatus(){
  document.getElementById("status-modal").style.display="flex";
  document.getElementById("status-name").value="";
  document.getElementById("status-result").style.display="none";
  document.getElementById("status-search").style.display="block";
}

function closeStatus(){
  document.getElementById("status-modal").style.display="none";
}

async function checkStatus(){
  const name=document.getElementById("status-name").value.trim();
  if(!name)return;
  const result=document.getElementById("status-result");
  const search=document.getElementById("status-search");
  search.style.display="none";
  result.style.display="block";
  result.innerHTML='<div style="text-align:center;padding:20px;color:#aaa;font-size:13px">Looking up your booking...</div>';

  try{
    const salonId=window.location.pathname.split("/").filter(Boolean).pop()||"salon1";
    const res=await fetch(`${BACKEND}/bookings/search?name=${encodeURIComponent(name)}&salon_id=${salonId}`,{cache:"no-store"});
    const bookings=await res.json();

    if(!Array.isArray(bookings)||bookings.length===0){
      result.innerHTML=`
        <div style="text-align:center;padding:10px 0">
          <div style="font-size:32px;margin-bottom:8px">🔍</div>
          <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:6px">No booking found</div>
          <div style="font-size:13px;color:#888;margin-bottom:14px">We couldn't find a booking under that name. Make sure you use the same name you gave when booking.</div>
          <button onclick="document.getElementById('status-search').style.display='block';document.getElementById('status-result').style.display='none'" style="width:100%;padding:9px;background:#f5f5f3;color:#111;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer">Try again</button>
        </div>`;
      return;
    }

    const b=bookings[0];
    const statusColor=b.status==="confirmed"?"#0F6E56":"#633806";
    const statusBg=b.status==="confirmed"?"#eafaf1":"#FAEEDA";
    result.innerHTML=`
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:32px;margin-bottom:8px">${b.status==="confirmed"?"✅":"⏳"}</div>
        <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:4px">${b.service}</div>
        <div style="font-size:13px;color:#888;margin-bottom:12px">${b.day} at ${b.time||b.hour+"am"} · ${b.client}</div>
        <span style="font-size:12px;padding:4px 14px;border-radius:20px;font-weight:600;background:${statusBg};color:${statusColor}">${b.status==="confirmed"?"Confirmed ✓":"Pending deposit"}</span>
        ${b.status==="pending"?`<div style="font-size:12px;color:#888;margin-top:12px">Please send your deposit to confirm your slot.</div>`:""}
        <button onclick="closeStatus()" style="display:block;width:100%;margin-top:14px;padding:9px;background:#111;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer">Close</button>
      </div>`;
  }catch{
    result.innerHTML=`
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:13px;color:#888">Could not load booking. Try again.</div>
        <button onclick="document.getElementById('status-search').style.display='block';document.getElementById('status-result').style.display='none'" style="width:100%;padding:9px;margin-top:10px;background:#f5f5f3;color:#111;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer">Try again</button>
      </div>`;
  }
}

// Booking modal
function showBookingModal(svc, client) {
  const existing = document.getElementById("booking-modal");
  if (existing) existing.remove();

  const today = new Date();
  const modal = document.createElement("div");
  modal.id = "booking-modal";
  modal.style.cssText = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;display:flex;align-items:flex-end;justify-content:center;padding:0";

  // Generate next 14 days
  const days = [];
  for (let i = 1; i <= 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push(d);
  }

  const times = ["9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM"];

  modal.innerHTML = `
    <div style="background:#fff;width:100%;max-width:420px;border-radius:20px 20px 0 0;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:600;color:#111">Select date & time</div>
        <button onclick="document.getElementById('booking-modal').remove()" style="background:none;border:none;font-size:22px;color:#aaa;cursor:pointer">×</button>
      </div>
      <div style="font-size:13px;color:#888;margin-bottom:14px">${svc} · ${client}</div>

      <div style="font-size:12px;font-weight:600;color:#111;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Select a date</div>
      <div style="display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;margin-bottom:16px" id="date-picker">
        ${days.map((d, i) => `
          <div onclick="selectDate(${i})" id="date-${i}" style="flex-shrink:0;width:56px;text-align:center;padding:10px 6px;border-radius:12px;border:1px solid #eee;cursor:pointer;background:#fff">
            <div style="font-size:10px;color:#888;text-transform:uppercase">${d.toLocaleDateString('en-US',{weekday:'short'})}</div>
            <div style="font-size:18px;font-weight:500;color:#111;margin:2px 0">${d.getDate()}</div>
            <div style="font-size:10px;color:#888">${d.toLocaleDateString('en-US',{month:'short'})}</div>
          </div>`).join("")}
      </div>

      <div style="font-size:12px;font-weight:600;color:#111;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Select a time</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px" id="time-picker">
        ${times.map((t, i) => `
          <div onclick="selectTime(${i})" id="time-${i}" style="text-align:center;padding:10px 6px;border-radius:10px;border:1px solid #eee;cursor:pointer;font-size:12px;color:#444;background:#fff">${t}</div>`).join("")}
      </div>

      <div style="font-size:12px;font-weight:600;color:#111;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px">Your details</div>
      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
        <input id="bk-fname" placeholder="First name" style="padding:10px 12px;border:1px solid #eee;border-radius:10px;font-size:13px;outline:none"/>
        <input id="bk-lname" placeholder="Last name" style="padding:10px 12px;border:1px solid #eee;border-radius:10px;font-size:13px;outline:none"/>
        <input id="bk-phone" placeholder="Phone number" type="tel" style="padding:10px 12px;border:1px solid #eee;border-radius:10px;font-size:13px;outline:none"/>
        <input id="bk-email" placeholder="Email address" type="email" style="padding:10px 12px;border:1px solid #eee;border-radius:10px;font-size:13px;outline:none"/>
      </div>

      <button onclick="confirmModalBooking('${svc}','${client}')" style="width:100%;padding:14px;background:#111;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer">Confirm booking</button>
      <p style="font-size:11px;color:#aaa;text-align:center;margin-top:8px">$35 deposit required to hold your slot</p>
    </div>`;

  document.body.appendChild(modal);
}

let selectedDate = null;
let selectedTime = null;

function selectDate(i) {
  document.querySelectorAll("[id^='date-']").forEach(el => {
    el.style.background = "#fff";
    el.style.borderColor = "#eee";
    el.querySelector("div:nth-child(2)").style.color = "#111";
  });
  const el = document.getElementById("date-" + i);
  el.style.background = "#111";
  el.style.borderColor = "#111";
  el.querySelector("div:nth-child(2)").style.color = "#fff";
  el.querySelectorAll("div").forEach(d => d.style.color = "#fff");
  selectedDate = i;
}

function selectTime(i) {
  document.querySelectorAll("[id^='time-']").forEach(el => {
    el.style.background = "#fff";
    el.style.borderColor = "#eee";
    el.style.color = "#444";
  });
  const el = document.getElementById("time-" + i);
  el.style.background = "#111";
  el.style.borderColor = "#111";
  el.style.color = "#fff";
  selectedTime = i;
}

async function confirmModalBooking(svc, client) {
  const fname = document.getElementById("bk-fname").value.trim();
  const lname = document.getElementById("bk-lname").value.trim();
  const phone = document.getElementById("bk-phone").value.trim();
  const email = document.getElementById("bk-email").value.trim();
  const times = ["9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM"];

  if (selectedDate === null) { alert("Please select a date."); return; }
  if (selectedTime === null) { alert("Please select a time."); return; }
  if (!fname || !phone) { alert("Please enter your first name and phone number."); return; }

  const today = new Date();
  const d = new Date(today);
  d.setDate(today.getDate() + selectedDate + 1);
  const dateStr = d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  const timeStr = times[selectedTime];
  const fullName = fname + (lname ? " " + lname : "");

  // Save to backend
  const salonId = window.location.pathname.split("/")[2] || "default";
  await fetch(BACKEND + "/bookings", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ client: fullName, service: svc, day: dateStr, time: timeStr, amount: 0, salon_id: salonId, phone, email })
  }).catch(() => {});

  document.getElementById("booking-modal").remove();
  if(depositMode!=="none") addPayCard(svc, dateStr, timeStr, fullName);
  else addBubble("bot","Your appointment is confirmed! We look forward to seeing you 💅");
  clientBookings.push({ client: fullName, service: svc, day: dateStr, time: timeStr, status: "pending", deposit: false });
}

loadSettings();
</script>
</body>
</html>
