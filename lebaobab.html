<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Le Baobab">
<title>Le Baobab Restaurant — Order Online</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#1a2340;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;overflow-x:hidden}
.wrap{width:100%;max-width:420px}
.demo-badge{text-align:center;margin-bottom:10px}
.demo-badge span{font-size:11px;background:#c9a84c;color:#1a2340;padding:4px 12px;border-radius:20px;letter-spacing:1px;font-weight:700}
.lang-bar{display:flex;gap:6px;justify-content:center;margin-bottom:8px}
.lang-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #c9a84c;background:transparent;color:#c9a84c;cursor:pointer;font-weight:500}
.lang-btn.active{background:#c9a84c;color:#1a2340}
.period-bar{display:flex;gap:6px;justify-content:center;margin-bottom:10px}
.period-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1px solid #c9a84c;background:transparent;color:#c9a84c;cursor:pointer;font-weight:500}
.period-btn.active{background:#c9a84c;color:#1a2340}
.chat-hdr{background:#0d1526;padding:12px 16px;display:flex;align-items:center;gap:10px;border-radius:12px 12px 0 0;border:1px solid #c9a84c;border-bottom:none}
.av{width:42px;height:42px;border-radius:50%;background:#c9a84c;display:flex;align-items:center;justify-content:center;color:#1a2340;font-weight:800;font-size:14px;flex-shrink:0}
.hdr-name{font-size:14px;font-weight:700;color:#f5e6c8}
.hdr-sub{font-size:11px;color:#c9a84c;margin-top:1px}
.hdr-status{font-size:11px;color:#c9a84c;display:flex;align-items:center;gap:5px;margin-top:2px}
.dot{width:6px;height:6px;border-radius:50%;background:#22c98a;display:inline-block}
.period-badge{font-size:10px;background:#c9a84c;color:#1a2340;padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:700}
.chat-body{height:400px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;background:#0a0f1e;border:1px solid #2a3a6e;border-top:none}
.bw-bot{display:flex;flex-direction:column;align-items:flex-start}
.bw-user{display:flex;flex-direction:column;align-items:flex-end}
.bl{font-size:10px;color:#6a7a9a;margin-bottom:2px}
.bb{font-size:14px;line-height:1.6;padding:10px 14px;max-width:85%}
.bb-bot{background:#0d1526;color:#f5e6c8;border:1px solid #2a3a6e;border-radius:4px 14px 14px 14px}
.bb-user{background:#c9a84c;color:#1a2340;border-radius:14px 4px 14px 14px;font-weight:600}
.quick-btns{display:flex;flex-wrap:wrap;gap:6px;padding:8px 12px;background:#0a0f1e;border:1px solid #2a3a6e;border-top:none}
.qbtn{font-size:12px;padding:6px 12px;border:1px solid #c9a84c;border-radius:20px;background:transparent;color:#c9a84c;cursor:pointer}
.qbtn:active{background:#c9a84c;color:#1a2340}
.input-row{display:flex;gap:8px;padding:10px 12px;background:#0d1526;border:1px solid #c9a84c;border-top:none;border-radius:0 0 12px 12px;align-items:center}
.inp{flex:1;font-size:14px;padding:9px 14px;border-radius:20px;border:1px solid #2a3a6e;background:#0a0f1e;color:#f5e6c8;outline:none}
.inp::placeholder{color:#6a7a9a}
.send-btn{width:38px;height:38px;border-radius:50%;background:#c9a84c;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.order-card{background:#0d1526;border:1px solid #c9a84c;border-radius:12px;padding:14px;max-width:88%}
.menu-item-row{display:flex;align-items:center;gap:10px;padding:8px;border-bottom:1px solid #1a2a5e;cursor:pointer;border-radius:8px;transition:background .15s}
.footer{text-align:center;font-size:11px;color:#6a7a9a;margin-top:10px}
.footer a{color:#c9a84c;text-decoration:none;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="demo-badge"><span>🍽️ LIVE DEMO — Powered by Dianké.ai</span></div>

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('en',this)">🇺🇸 English</button>
    <button class="lang-btn" onclick="setLang('fr',this)">🇫🇷 Français</button>
    <button class="lang-btn" onclick="setLang('wo',this)">🇸🇳 Wolof</button>
  </div>

  <div class="period-bar">
    <button class="period-btn" id="per-lunch" onclick="setPeriod('lunch',this)">☀️ Lunch</button>
    <button class="period-btn active" id="per-dinner" onclick="setPeriod('dinner',this)">🌙 Dinner</button>
  </div>

  <div class="chat-hdr">
    <div class="av">LB</div>
    <div style="flex:1">
      <div style="display:flex;align-items:center">
        <div class="hdr-name">Le Baobab Restaurant</div>
        <span class="period-badge" id="period-badge">Dinner</span>
      </div>
      <div class="hdr-sub">120 W 116th St, Harlem, NY</div>
      <div class="hdr-status"><span class="dot"></span><span id="status-text">AI assistant · always open</span></div>
    </div>
  </div>

  <div class="chat-body" id="chat-body"></div>
  <div class="quick-btns" id="quick-btns"></div>

  <div class="input-row">
    <input class="inp" id="inp" placeholder="Type your order or question..." onkeydown="if(event.key==='Enter')send()"/>
    <button class="send-btn" onclick="send()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="#1a2340"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>

  <div class="footer">
    Powered by <a href="https://dianke.ai">Dianké.ai</a> · 
    <span onclick="openOrderStatus()" style="color:#c9a84c;cursor:pointer;font-weight:600">Check my order →</span>
  </div>

  <!-- Order status modal -->
  <div id="order-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:999;align-items:center;justify-content:center;padding:20px">
    <div style="background:#0d1526;border:1px solid #c9a84c;border-radius:14px;padding:20px;width:100%;max-width:380px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-size:15px;font-weight:600;color:#f5e6c8">Check my order</div>
        <button onclick="document.getElementById('order-modal').style.display='none'" style="background:none;border:none;font-size:20px;color:#6a7a9a;cursor:pointer">×</button>
      </div>
      <input id="order-name" placeholder="Enter the name used to order" style="width:100%;font-size:14px;padding:9px 12px;border:1px solid #2a3a6e;border-radius:8px;outline:none;margin-bottom:10px;background:#0a0f1e;color:#f5e6c8"/>
      <button onclick="checkOrder()" style="width:100%;padding:10px;background:#c9a84c;color:#1a2340;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer">Check status</button>
      <div id="order-result" style="margin-top:12px"></div>
    </div>
  </div>
</div>

<script>
const BACKEND = "https://dianke.ai";
const salonId = "lebaobab";
let hist = [], busy = false, currentLang = "en", currentPeriod = "dinner";

const MENUS = {
  lunch: {
    en: "Thiebou Djeun (Djolof Rice) $15, Thiebou Yapp (Lamb) $15, Thiu Poisson $15, Suppu Kandja (Okra Sauce) $15, Lamb Maffe (Peanut Butter Stew) $15, Borrokhe $15, Domada Yapp $15, Chicken Yassa $15, Thiebou Ginar $15, Sulukhu $15, Fataya (5pcs) $10, Nems (5pcs) $10",
    fr: "Thiéboudiène (Riz Djolof) $15, Thiébou Yapp (Agneau) $15, Thiu Poisson $15, Suppu Kandja (Sauce Gombo) $15, Mafé d'Agneau $15, Borrokhe $15, Domada Yapp $15, Poulet Yassa $15, Thiébou Ginar $15, Sulukhu $15, Fataya (5pcs) $10, Nems (5pcs) $10",
    wo: "Ceebu Jën $15, Ceebu Yapp $15, Thiu Jën $15, Suppu Kandja $15, Mafé Xaj $15, Borrokhe $15, Domada Yapp $15, Yassa Ganaar $15, Ceebu Ginar $15, Sulukhu $15, Fataya (5pcs) $10, Nems (5pcs) $10"
  },
  dinner: {
    en: "Soup (Oxtail) $16, Debe (Lamb chops) $16, Debe Senegal $17, Brochette (Chicken Kebab) $16, Grilled Chicken $16, Fried Pintade $17, Poulet Senegal $18, Debe Ginar $16, Fried Fish $18, Grilled Fish $18, Thiebou Yapp $15, Thieray (Couscous) $15, Shawarma $11, Red Snapper $20, Mechoui (Braised Lamb) $20, Petit Poids $16, Fataya (5pcs) $10, Nems (5pcs) $10",
    fr: "Soupe (Queue de Boeuf) $16, Debe (Côtelettes d'Agneau) $16, Debe Sénégal $17, Brochette (Kebab) $16, Poulet Grillé $16, Pintade Frite $17, Poulet Sénégal $18, Debe Ginar $16, Poisson Frit $18, Poisson Grillé $18, Thiébou Yapp $15, Thiéray (Couscous) $15, Shawarma $11, Vivaneau Rouge $20, Mechoui (Agneau Braisé) $20, Petit Pois $16, Fataya (5pcs) $10, Nems (5pcs) $10",
    wo: "Soupe (Loxo Ngomb) $16, Debe $16, Debe Senegaal $17, Brochette $16, Ganaar bu Tann $16, Pintade $17, Poulet Senegaal $18, Debe Ginar $16, Jën bu Sonn $18, Jën bu Tann $18, Ceebu Yapp $15, Thieray $15, Shawarma $11, Red Snapper $20, Mechoui $20, Petit Pois $16, Fataya (5pcs) $10, Nems (5pcs) $10"
  }
};

const SIDES = "Salad $1, French Fries $4, White Rice $1, Couscous $5, Alloko $6, Vermicelli $6";
const DRINKS = "Bouye (Baobab fruit) $3, Bissap Juice (Sorrel) $3, Ginger (Homemade) $3, Soda $1, Spring Water $1";
const DESSERT = "Thiakry $4";

const LANGS = {
  en: {
    status: "AI assistant · always open",
    placeholder: "Type your order or question...",
    label: "Le Baobab AI",
    periods: { lunch: "Lunch", dinner: "Dinner" },
    quick: { 
  lunch: ["📋 See lunch menu", "🥘 Order Thiebou Djeun", "🍗 Order Chicken Yassa", "📞 Call us"],
  dinner: ["📋 See dinner menu", "🍖 Order Debe", "🐟 Order Grilled Fish", "📞 Call us"]
}
  },
  fr: {
    status: "Assistant IA · toujours disponible",
    placeholder: "Tapez votre commande...",
    label: "Le Baobab IA",
    periods: { lunch: "Déjeuner", dinner: "Dîner" },
   quick: {
  lunch: ["📋 Voir le menu", "🥘 Commander Thiéboudiène", "🍗 Commander Poulet Yassa", "📞 Nous appeler"],
  dinner: ["📋 Voir le menu", "🍖 Commander Debe", "🐟 Commander Poisson Grillé", "📞 Nous appeler"]
}
  },
  wo: {
    status: "AI ji · def ak yëgël ak jaamu",
    placeholder: "Bind sa commande...",
    label: "Le Baobab AI",
    periods: { lunch: "Déjeuner", dinner: "Dîner" },
    quick: {
      lunch: ["📋 Xool menu bi", "🥘 Commande Ceebu Jën", "🍗 Commande Yassa", "⏱️ Benn waxtu?"],
      dinner: ["📋 Xool menu bi", "🍖 Commande Debe", "🐟 Commande Jën bu Tann", "⏱️ Benn waxtu?"]
    }
  }
};

function buildSystem() {
  const menu = MENUS[currentPeriod][currentLang];
  const period = LANGS[currentLang].periods[currentPeriod];
  if (currentLang === "fr") return `Tu es l'assistant IA du Restaurant Le Baobab, un restaurant sénégalais authentique à Harlem, New York. Sois chaleureux en français.\n${period} Menu: ${menu}\nAccompagnements: ${SIDES}\nBoissons: ${DRINKS}\nDessert: ${DESSERT}\nHoraires: 7j/7. À emporter: 20-30 min. Livraison disponible. Sur place bienvenu.\nTél: 212 864 4700 · 120 W 116th St, Harlem NY\nQuand le client commande: confirme les articles, donne le total, le temps estimé, demande le nom, type (sur place/à emporter/livraison) et numéro de téléphone (optionnel). Puis: ORDER_CONFIRMED:[articles]:[total]:[temps]:[nom]:[type]:[téléphone-ou-vide]\nMoins de 90 mots. Texte simple.`;
  if (currentLang === "wo") return `Yaa ngi représente Restaurant Le Baobab, restaurant sénégalais wi ci Harlem, New York. Jaamu ci Wolof.\nMenu ${period}: ${menu}\nGëm yi: ${SIDES}\nNéktaan yi: ${DRINKS}\nDessert: ${DESSERT}\nWaxtu: 7 fan. À emporter: 20-30 min.\nBu client bi commande: xalaat li, prix bi, waxtu bi, laaj tur, loolu, ak téléphone (optionnel). Ci kanam: ORDER_CONFIRMED:[articles]:[total]:[waxtu]:[tur]:[loolu]:[phone-walla-tuuti]\nMots yu néew. Texte simple.`;
  return `You are the AI order assistant for Le Baobab Restaurant, an authentic Senegalese restaurant in Harlem, New York. Be warm and welcoming.\n${period} Menu: ${menu}\nSides: ${SIDES}\nDrinks: ${DRINKS}\nDessert: ${DESSERT}\nHours: Open 7 days/week. Takeout: 20-30 mins. Free delivery available. Dine-in welcome.\nTel: 212 864 4700 · 120 W 116th St, Harlem NY\nWhen customer orders: confirm items, total, estimated time, ask name, order type (dine-in/takeout/delivery), and phone number (optional). Then: ORDER_CONFIRMED:[items]:[total]:[time]:[name]:[type]:[phone-or-empty]\nUnder 90 words. Plain text only.`;
}

function buildWelcome() {
  const period = LANGS[currentLang].periods[currentPeriod];
  if (currentLang === "fr") return `Bienvenue au Restaurant Le Baobab! 🍽️ Nous servons notre menu ${period}. Spécialités sénégalaises authentiques à Harlem depuis des années. Comment puis-je vous aider?`;
  if (currentLang === "wo") return `Dalal jaam ci Restaurant Le Baobab! 🍽️ Lëndëm ${period} la ñu def tëy. Lan nga bëgg?`;
  return `Welcome to Le Baobab Restaurant! 🍽️ We're serving our ${period} menu. Authentic Senegalese cuisine in the heart of Harlem. How can I help you today?`;
}

function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll(".period-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("period-badge").textContent = LANGS[currentLang].periods[period];
  hist = [];
  document.getElementById("chat-body").innerHTML = "";
  addBubble("bot", buildWelcome());
  renderQuick();
}

function setLang(lang, btn) {
  currentLang = lang;
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("status-text").textContent = LANGS[lang].status;
  document.getElementById("inp").placeholder = LANGS[lang].placeholder;
  hist = [];
  document.getElementById("chat-body").innerHTML = "";
  addBubble("bot", buildWelcome());
  renderQuick();
}

function renderQuick() {
  const btns = LANGS[currentLang].quick[currentPeriod];
  document.getElementById("quick-btns").innerHTML = btns.map(q =>
    `<button class="qbtn" onclick="send('${q.replace(/'/g, "\\'")}')">${q}</button>`
  ).join("");
}

function addBubble(role, text) {
  const el = document.getElementById("chat-body");
  const w = document.createElement("div");
  w.className = role === "bot" ? "bw-bot" : "bw-user";
  if (role === "bot") {
    const l = document.createElement("div");
    l.className = "bl";
    l.textContent = LANGS[currentLang].label;
    w.appendChild(l);
  }
  const b = document.createElement("div");
  b.className = `bb bb-${role}`;
  b.textContent = text;
  w.appendChild(b);
  el.appendChild(w);
  el.scrollTop = el.scrollHeight;
}

function addOrderCard(items, total, time, name, type, phone) {
  const el = document.getElementById("chat-body");
  const w = document.createElement("div");
  w.className = "bw-bot";
  const orderNum = "#" + (1000 + Math.floor(Math.random() * 9000));
  w.innerHTML = `
    <div class="bl">${LANGS[currentLang].label}</div>
    <div class="order-card">
      <div style="font-size:14px;font-weight:700;color:#c9a84c;margin-bottom:8px">✅ Order Confirmed!</div>
      <div style="background:#0a0f1e;border-radius:10px;padding:12px;text-align:center;margin-bottom:10px;border:1px solid #c9a84c">
        <div style="font-size:11px;color:#6a7a9a;margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Your Order Number</div>
        <div style="font-size:32px;font-weight:800;color:#c9a84c;letter-spacing:2px">${orderNum}</div>
      </div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">🍽️ ${items}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:4px">💰 Total: ${total}</div>
      <div style="font-size:13px;color:#f5e6c8;margin-bottom:8px">👤 ${name} · ${type}</div>
      <div style="font-size:11px;color:#6a7a9a;text-align:center;margin-bottom:4px">💵 Pay at pickup with cash or card</div>
      ${phone ? `<div style="font-size:11px;color:#22c98a;text-align:center">📱 We'll WhatsApp you when it's ready</div>` : ""}
      <div style="font-size:11px;color:#6a7a9a;text-align:center;margin-top:6px">Show this number when you pick up · 120 W 116th St</div>
    </div>`;
  el.appendChild(w);
  el.scrollTop = el.scrollHeight;
}

async function send(txt) {
  const inp = document.getElementById("inp");
  const t = txt || (inp ? inp.value.trim() : "");
  if (!t || busy) return;
  if (inp) inp.value = "";
  if (/call us|nous appeler/i.test(t)) {
  addBubble("bot", "📞 Our phone number will be available here once we go live. For now, place your order through chat!");
  busy = false;
  return;
}
  addBubble("user", t);
  hist.push({ role: "user", content: t });
  busy = true;
  const typing = document.createElement("div");
  typing.className = "bw-bot";
  typing.id = "typing";
  typing.innerHTML = `<div class="bl">${LANGS[currentLang].label}</div><div class="bb bb-bot" style="color:#6a7a9a">...</div>`;
  document.getElementById("chat-body").appendChild(typing);
  document.getElementById("chat-body").scrollTop = 9999;
  try {
    const res = await fetch(BACKEND + "/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ system: buildSystem(), messages: hist })
    });
    const d = await res.json();
    const raw = (d?.content?.[0]?.text || "...").replace(/\*\*(.*?)\*\*/g, "$1");
    const dm = raw.match(/ORDER_CONFIRMED:([^:]+):([^:]+):([^:]+):([^:]+):([^:]+):?([^\n]*)/);
    const reply = raw.replace(/ORDER_CONFIRMED:[^\n]*/, "").trim();
    document.getElementById("typing")?.remove();
    hist.push({ role: "assistant", content: raw });
    if (reply) addBubble("bot", reply);
    if (dm) addOrderCard(dm[1].trim(), dm[2].trim(), dm[3].trim(), dm[4].trim(), dm[5].trim(), dm[6]?.trim() || "");
  } catch (e) {
    document.getElementById("typing")?.remove();
    addBubble("bot", "Connection issue. Please try again.");
    hist.pop();
  }
  busy = false;
}

function openOrderStatus() {
  document.getElementById("order-modal").style.display = "flex";
}

function checkOrder() {
  const name = document.getElementById("order-name").value.trim();
  if (!name) return;
  document.getElementById("order-result").innerHTML = `<div style="text-align:center;color:#6a7a9a;font-size:13px;padding:10px">This is a live demo — order tracking will be active when Le Baobab goes live on Dianké.ai</div>`;
}

// Init
addBubble("bot", buildWelcome());
renderQuick();
</script>
</body>
</html>
